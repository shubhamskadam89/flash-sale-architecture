name: Continuous Integration

on:
  push:
    branches:
      - main
      - feature/**
      - ops/**

  pull_request:
    branches:
      - main

jobs:

  backend:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Verify Maven
        run: mvn -version

      - name: Build Backend
        run: mvn clean package -DskipTests