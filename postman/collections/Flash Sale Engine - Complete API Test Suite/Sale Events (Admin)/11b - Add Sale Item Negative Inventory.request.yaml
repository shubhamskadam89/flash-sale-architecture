$kind: http-request
name: 11b - Add Sale Item Negative Inventory
url: "{{baseUrl}}/api/v1/admin/sales/{{saleUuid}}/items"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "productUuid": "{{productUuid}}",
      "salePrice": 3999.00,
      "inventory": -10,
      "maxPerUser": 2
    }
auth:
  type: bearer
  credentials:
    token: "{{accessToken}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Add Sale Item Negative Inventory: Expects 400 Bad Request', function () {
          pm.expect(pm.response.code).to.equal(400);
          var j = pm.response.json();
          pm.expect(j).to.have.property('message');
          console.log('Rejection message:', j.message);
      });
    language: text/javascript
order: 2100
