$kind: http-request
name: 12b2 - Activate Empty Sale Event
url: "{{baseUrl}}/api/v1/admin/sales/{{emptySaleUuid}}/activate"
method: POST
auth:
  type: bearer
  credentials:
    token: "{{accessToken}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Activate Empty Sale: Expects 400 Bad Request', function () {
          pm.expect(pm.response.code).to.equal(400);
          var j = pm.response.json();
          pm.expect(j).to.have.property('message');
          console.log('Rejection message:', j.message);
      });
    language: text/javascript
order: 3200
