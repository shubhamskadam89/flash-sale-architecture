$kind: http-request
url: "{{baseUrl}}/api/v1/admin/sales/{{saleUuid}}/items"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "productUuid": "{{productUuid}}",
      "salePrice": 3999.00,
      "inventory": 100,
      "maxPerUser": 2
    }
auth:
  type: bearer
  credentials:
    token: "{{accessToken}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Sale item added and UUID captured', function () {
          pm.response.to.have.status(200);
          var j = pm.response.json();
          pm.expect(j).to.have.property('saleItemUuid');
          pm.collectionVariables.set('saleItemUuid', j.saleItemUuid);
          console.log('Sale Item UUID:', j.saleItemUuid);
      });
    language: text/javascript
order: 2000
