$kind: http-request
name: 12b1 - Create Draft Sale For Empty Test
url: "{{baseUrl}}/api/v1/admin/sales"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "name": "Empty Sale Event",
      "startTime": "{{emptySaleStartTime}}",
      "endTime": "{{emptySaleEndTime}}"
    }
auth:
  type: bearer
  credentials:
    token: "{{accessToken}}"
scripts:
  - type: beforeRequest
    code: |-
      var now = new Date();
      var start = new Date(now.getTime() + 5000);
      var end   = new Date(now.getTime() + 60 * 60 * 1000);
      function fmt(d) {
          var p = n => String(n).padStart(2,'0');
          return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+'T'+p(d.getHours())+':'+p(d.getMinutes())+':'+p(d.getSeconds());
      }
      pm.collectionVariables.set('emptySaleStartTime', fmt(start));
      pm.collectionVariables.set('emptySaleEndTime', fmt(end));
    language: text/javascript
  - type: afterResponse
    code: |-
      pm.test('Empty Sale event created and UUID captured', function () {
          pm.response.to.have.status(200);
          var j = pm.response.json();
          pm.collectionVariables.set('emptySaleUuid', j.saleUuid);
          console.log('Empty Sale UUID:', j.saleUuid);
      });
    language: text/javascript
order: 3100
