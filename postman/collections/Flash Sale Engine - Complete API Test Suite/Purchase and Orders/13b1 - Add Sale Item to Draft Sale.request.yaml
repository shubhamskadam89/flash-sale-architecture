$kind: http-request
name: 13b1 - Add Sale Item to Draft Sale
url: "{{baseUrl}}/api/v1/admin/sales/{{emptySaleUuid}}/items"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "productUuid": "{{productUuid}}",
      "salePrice": 1999.00,
      "inventory": 10,
      "maxPerUser": 1
    }
auth:
  type: bearer
  credentials:
    token: "{{accessToken}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Sale item added to draft sale and UUID captured', function () {
          pm.response.to.have.status(200);
          var j = pm.response.json();
          pm.collectionVariables.set('draftSaleItemUuid', j.saleItemUuid);
          console.log('Draft Sale Item UUID:', j.saleItemUuid);
      });
    language: text/javascript
order: 1100
