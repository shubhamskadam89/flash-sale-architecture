$kind: http-request
name: 13e - Purchase Invalid Quantity
url: "{{baseUrl}}/api/v1/sales/{{saleUuid}}/items/{{saleItemUuid}}/purchase"
method: POST
headers:
  Content-Type: application/json
  X-Idempotency-Key: "{{invalidQtyIdempotencyKey}}"
body:
  type: json
  content: |-
    {
      "quantity": 0
    }
auth:
  type: bearer
  credentials:
    token: "{{accessToken}}"
scripts:
  - type: beforeRequest
    code: |-
      const key = pm.variables.replaceIn('{{$guid}}');
      pm.collectionVariables.set('invalidQtyIdempotencyKey', key);
    language: text/javascript
  - type: afterResponse
    code: |-
      pm.test('Purchase Invalid Qty: Expects 400 Bad Request', function () {
          pm.expect(pm.response.code).to.equal(400);
          var j = pm.response.json();
          pm.expect(j).to.have.property('message');
          console.log('Rejection message:', j.message);
      });
    language: text/javascript
order: 1500
