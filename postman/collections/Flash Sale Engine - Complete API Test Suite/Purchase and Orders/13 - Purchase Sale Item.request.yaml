$kind: http-request
url: "{{baseUrl}}/api/v1/sales/{{saleUuid}}/items/{{saleItemUuid}}/purchase"
method: POST
headers:
  Content-Type: application/json
  X-Idempotency-Key: "{{idempotencyKey}}"
body:
  type: json
  content: |-
    {
      "quantity": 1
    }
auth:
  type: bearer
  credentials:
    token: "{{accessToken}}"
scripts:
  - type: beforeRequest
    code: |-
      const key = pm.variables.replaceIn('{{$guid}}');
      pm.collectionVariables.set('idempotencyKey', key);
      console.log('Idempotency Key:', key);
    language: text/javascript
  - type: afterResponse
    code: |-
      pm.test('Purchase successful and order UUID captured', function () {
          pm.response.to.have.status(200);

          const j = pm.response.json();

          pm.expect(j).to.have.property('orderUuid');
          pm.expect(j).to.have.property('saleItemUuid');
          pm.expect(j).to.have.property('productUuid');
          pm.expect(j).to.have.property('remainingInventory');

          pm.collectionVariables.set('orderUuid', j.orderUuid);

          console.log('Order UUID:', j.orderUuid);
          console.log('Remaining Inventory:', j.remainingInventory);
      });
    language: text/javascript
order: 1000
