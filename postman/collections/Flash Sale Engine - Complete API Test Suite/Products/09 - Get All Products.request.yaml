$kind: http-request
url: "{{baseUrl}}/api/v1/products"
method: GET
auth:
  type: bearer
  credentials:
    token: "{{accessToken}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test('All products returned as array', function () {
          pm.response.to.have.status(200);
          var j = pm.response.json();
          pm.expect(j).to.be.an('array');
          console.log('Total products:', j.length);
      });
    language: text/javascript
order: 3000
