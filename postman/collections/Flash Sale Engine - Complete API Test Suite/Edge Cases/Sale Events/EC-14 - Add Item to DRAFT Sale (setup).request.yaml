$kind: http-request
name: 'EC-14 - Add Item to DRAFT Sale (setup)'
url: '{{baseUrl}}/api/v1/admin/sales/{{ecDraftSaleUuid}}/items'
method: POST
headers:
  Content-Type: application/json
auth:
  type: bearer
  credentials:
    token: '{{accessToken}}'
body:
  type: json
  content: |-
    {
      "productUuid": "{{productUuid}}",
      "salePrice": 2999.00,
      "inventory": 10,
      "maxPerUser": 1
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('EC-14 setup: Item added to draft sale', function () {
          pm.expect(pm.response.code).to.equal(200);
          const j = pm.response.json();
          pm.collectionVariables.set('ecDraftSaleItemUuid', j.saleItemUuid);
          console.log('EC-14: Draft sale item UUID:', j.saleItemUuid);
      });
    language: text/javascript
order: 2000
