$kind: http-request
name: 'EC-02 - Login Wrong Password'
url: '{{baseUrl}}/api/v1/auth/login'
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "email": "postman_admin@flashsale.com",
      "password": "totally_wrong_password"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('EC-02: Login with wrong password should return 401', function () {
          pm.expect(pm.response.code).to.equal(401,
              'Expected 401 Unauthorized for wrong password, got: ' + pm.response.code);
      });

      pm.test('EC-02: Response must not contain accessToken', function () {
          const text = pm.response.text();
          pm.expect(text).to.not.include('accessToken',
              'A token was returned despite wrong credentials — critical auth bug!');
      });

      pm.test('EC-02: accessToken collection variable must not be overwritten', function () {
          const token = pm.collectionVariables.get('accessToken');
          pm.expect(token).to.be.a('string').and.not.be.empty;
      });
    language: text/javascript
order: 2000
