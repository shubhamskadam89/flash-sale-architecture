$kind: http-request
name: 'EC-04 - Refresh with Revoked Token'
url: '{{baseUrl}}/api/v1/auth/refresh'
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "refreshToken": "00000000-0000-0000-0000-000000000000"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('EC-04: Refresh with non-existent token should return 401', function () {
          pm.expect(pm.response.code).to.equal(401,
              'Expected 401 Unauthorized for invalid refresh token, got: ' + pm.response.code);
      });

      pm.test('EC-04: Error code is REFRESH_TOKEN_NOT_FOUND', function () {
          const j = pm.response.json();
          pm.expect(j).to.have.property('errorCode');
          pm.expect(j.errorCode).to.equal('REFRESH_TOKEN_NOT_FOUND');
      });
    language: text/javascript
order: 4000
