$kind: http-request
name: 'EC-08 - Activate Expired Sale (setup)'
url: '{{baseUrl}}/api/v1/admin/sales/{{ecExpiredSaleUuid}}/activate'
method: POST
auth:
  type: bearer
  credentials:
    token: '{{accessToken}}'
scripts:
  - type: afterResponse
    code: |-
      pm.test('EC-08 setup: Expired sale activated', function () {
          pm.expect(pm.response.code).to.equal(200);
          console.log('EC-08: Sale activated. Waiting for it to expire before purchasing...');
      });
    language: text/javascript
order: 4000
