$kind: http-request
name: 'EC-10 - Purchase Missing Idempotency Key'
url: '{{baseUrl}}/api/v1/sales/{{saleUuid}}/items/{{saleItemUuid}}/purchase'
method: POST
headers:
  Content-Type: application/json
auth:
  type: bearer
  credentials:
    token: '{{accessToken}}'
body:
  type: json
  content: |-
    {
      "quantity": 1
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('EC-10: Missing X-Idempotency-Key should return 400', function () {
          pm.expect(pm.response.code).to.equal(400,
              'Expected 400 Bad Request when X-Idempotency-Key header is absent, got: ' + pm.response.code +
              '. IdempotencyFilter should reject the request before it reaches the controller.');
      });

      pm.test('EC-10: Response mentions missing idempotency key', function () {
          const text = pm.response.text();
          pm.expect(text.toLowerCase()).to.include('idempotency',
              'Error message does not mention the missing idempotency key — client has no way to know what went wrong.');
      });

      pm.test('EC-10: No orderUuid returned', function () {
          pm.expect(pm.response.text()).to.not.include('orderUuid');
      });
    language: text/javascript
order: 6000
