$kind: http-request
url: "{{baseUrl}}/api/v1/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "email": "postman_admin@flashsale.com",
      "password": "password123"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Login successful and tokens captured', function () {
          pm.response.to.have.status(200);
          var j = pm.response.json();
          pm.expect(j).to.have.property('accessToken');
          pm.expect(j).to.have.property('refreshToken');
          pm.collectionVariables.set('accessToken', j.accessToken);
          pm.collectionVariables.set('refreshToken', j.refreshToken);
          console.log('Access token captured:', j.accessToken.substring(0, 20) + '...');
      });
    language: text/javascript
order: 3000
