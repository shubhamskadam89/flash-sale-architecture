$kind: http-request
name: 03b - Login Wrong Password
url: "{{baseUrl}}/api/v1/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "email": "postman_user@flashsale.com",
      "password": "wrongpassword"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Login Wrong Password: Expects 401 Unauthorized', function () {
          pm.expect(pm.response.code).to.equal(401);
          var j = pm.response.json();
          pm.expect(j).to.have.property('message');
          console.log('Wrong Password rejection message:', j.message);
      });
    language: text/javascript
order: 3100
