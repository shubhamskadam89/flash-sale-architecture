$kind: http-request
url: "{{baseUrl}}/api/v1/auth/register"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "email": "postman_admin@flashsale.com",
      "password": "password123",
      "role": "ADMIN",
      "fullName": "Postman Admin User"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Register: 200 OK or 400 already exists', function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 400]);
      });
      if (pm.response.code === 200) {
          var j = pm.response.json();
          pm.test('Response has email', function () { pm.expect(j).to.have.property('email'); });
      }
    language: text/javascript
order: 1000
